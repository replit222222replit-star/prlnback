pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropsFile = file("local.properties")
        if (localPropsFile.exists()) {
            localPropsFile.withInputStream { properties.load(it) }
        }
        def path = properties.getProperty("flutter.sdk")
        if (path == null) path = System.getenv("FLUTTER_ROOT")
        assert path != null, "flutter.sdk not set in local.properties and FLUTTER_ROOT not set"
        return path
    }()
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.10" apply false
    id "com.google.gms.google-services" version "4.4.0" apply false
}

include ":app"
