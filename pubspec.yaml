name: neo_genesis
description: NEO-GENESIS — Jarvis-style AI assistant for Android with Groq vision and deep accessibility control.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_messaging: ^14.7.19
  provider: ^6.1.2
  http: ^1.2.1
  flutter_shaders: ^0.0.1
  permission_handler: ^11.3.1
  animated_text_kit: ^4.2.2
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.2.5
  flutter_tts: ^3.8.5
  record: ^6.0.0
  path_provider: ^2.1.3
  avatar_glow: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/shaders/
    - assets/images/
